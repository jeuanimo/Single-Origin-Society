{% extends "portal/base.html" %}
{% block title %}Add Expense{% endblock title %}
{% block content %}
<h2 class="p-page-title-mb">Add Expense</h2>
<form method="post">
  {% csrf_token %}
  <div class="p-card">
    <div class="p-form-group">
      <label for="id_category">Category</label>
      <select name="category" id="id_category" class="p-form-control" required>
        <option value="">Select...</option>
        <option value="cogs">Cost of Goods Sold</option>
        <option value="shipping">Shipping</option>
        <option value="marketing">Marketing</option>
        <option value="software">Software</option>
        <option value="supplies">Office Supplies</option>
        <option value="rent">Rent</option>
        <option value="utilities">Utilities</option>
        <option value="payroll">Payroll</option>
        <option value="other">Other</option>
      </select>
    </div>
    <div class="p-form-group"><label for="id_description">Description</label><input type="text" name="description" id="id_description" class="p-form-control" required></div>
    <div class="p-form-row">
      <div class="p-form-group"><label for="id_amount">Amount</label><input type="number" step="0.01" name="amount" id="id_amount" class="p-form-control" required></div>
      <div class="p-form-group"><label for="id_date">Date</label><input type="date" name="date" id="id_date" class="p-form-control" required></div>
    </div>
    <div class="p-form-group"><label for="id_notes">Notes</label><textarea name="notes" id="id_notes" class="p-form-control" rows="3"></textarea></div>
  </div>
  <div class="p-form-actions">
    <button type="submit" class="p-btn p-btn-primary">Save Expense</button>
    <a href="{% url 'portal:finance_overview' %}" class="p-btn p-btn-secondary">Cancel</a>
  </div>
</form>
{% endblock content %}
