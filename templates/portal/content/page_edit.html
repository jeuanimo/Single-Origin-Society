{% extends "portal/base.html" %}
{% block title %}{% if page %}Edit Page{% else %}New Page{% endif %}{% endblock title %}
{% block content %}
<h2 class="p-page-title-mb">{% if page %}Edit: {{ page.title }}{% else %}New Page{% endif %}</h2>
<form method="post">
  {% csrf_token %}
  <div class="p-card">
    <div class="p-form-group"><label for="id_title">Title</label><input type="text" name="title" id="id_title" class="p-form-control" value="{{ page.title|default:'' }}" required></div>
    <div class="p-form-group"><label for="id_slug">Slug</label><input type="text" name="slug" id="id_slug" class="p-form-control" value="{{ page.slug|default:'' }}" required></div>
    <div class="p-form-group"><label for="id_body">Content</label><textarea name="body" id="id_body" class="p-form-control" rows="15">{{ page.body|default:'' }}</textarea></div>
    <div class="p-form-group"><label for="id_meta_description">Meta Description</label><input type="text" name="meta_description" id="id_meta_description" class="p-form-control" value="{{ page.meta_description|default:'' }}"></div>
    <div class="p-form-check">
      <input type="checkbox" name="is_published" id="is_published" {% if page.is_published %}checked{% endif %}>
      <label for="is_published">Published</label>
    </div>
  </div>
  <div class="p-form-actions">
    <button type="submit" class="p-btn p-btn-primary">Save Page</button>
    <a href="{% url 'portal:content_pages' %}" class="p-btn p-btn-secondary">Cancel</a>
  </div>
</form>
{% endblock content %}
