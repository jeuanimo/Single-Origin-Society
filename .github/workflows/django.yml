name: Django CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: sos_test
          POSTGRES_USER: sos_user
          POSTGRES_PASSWORD: testpass
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run Django checks
      env:
        DJANGO_SECRET_KEY: test-key-for-ci
        DB_ENGINE: django.db.backends.postgresql
        DB_NAME: sos_test
        DB_USER: sos_user
        DB_PASSWORD: testpass
        DB_HOST: localhost
        DB_PORT: 5432
        DJANGO_DEBUG: 'False'
      run: python manage.py check
    
    - name: Run migrations
      env:
        DJANGO_SECRET_KEY: test-key-for-ci
        DB_ENGINE: django.db.backends.postgresql
        DB_NAME: sos_test
        DB_USER: sos_user
        DB_PASSWORD: testpass
        DB_HOST: localhost
        DB_PORT: 5432
        DJANGO_DEBUG: 'False'
      run: python manage.py migrate
    
    - name: Run tests
      env:
        DJANGO_SECRET_KEY: test-key-for-ci
        DB_ENGINE: django.db.backends.postgresql
        DB_NAME: sos_test
        DB_USER: sos_user
        DB_PASSWORD: testpass
        DB_HOST: localhost
        DB_PORT: 5432
        DJANGO_DEBUG: 'False'
      run: python manage.py test
